<script>
const AUTOMATIONS=[{"id":"wfljOTv1Z1VQ4goVq","name":"NY Client Clears - Slack Message","description":"This automation sends a Slack message when a record in the appointments table meets specific conditions and updates the stage to 'Deliberating' in the DF Clients table. It ensures timely communication regarding client status and facilitates workflow management.","status":"deployed","version":323,"trigger":{"typeId":"wttRECORDMATCHES0","label":"Record matches conditions","tableId":"tblvV7uKTCaFFekoR","tableLabel":"tblvV7uKTCaFFekoR","scheduleDetail":null},"steps":[{"type":"watSENDTOSLACK000","label":"Send Slack message","script":null,"table":null,"tableLabel":null,"fieldsWritten":[],"fieldsLabels":[],"prompt":null,"model":null,"to":"C04DAT5H50B","subject":null,"message":"{dynamic} has cleared {dynamic} with {dynamic}."},{"type":"watCUSTOMSCRIPT00","label":"Run script","script":"/*\n================================================================================\nAUTOMATION   : NY Client Clears - Update Stage to Deliberating (extiende\n               \"NY Client Clears - Slack Message\" — mismo trigger, se le añade\n               este paso de actualización de stage)\nBASE         : app6Q4xMZ1ngJxiV8 (sandbox) — publicar a producción luego\nTABLE SRC    : appointments (tblvV7uKTCaFFekoR)\nTABLE DEST   : DF Clients (tblLLUlDgJ4ktzF7c)\nTRIGGER      : Record matches conditions — appointments, Cleared = true\n               (mismo trigger que ya dispara el mensaje de Slack)\nVERSION      : 1.0.0 — todos los field IDs verificados contra appointments.tsx\n\nOBJECTIVE\n  Reemplaza el hardcode de stage-transition que vivía en appointments.tsx\n  (handleClear) por esta automation. Cuando un appointment se marca Cleared,\n  si el appointment no está cancelado y el cliente vinculado está actualmente\n  en \"Pre-Appointment\", actualiza DF Clients.stage a \"Deliberating\".\n\n  Esta automation corre EN PARALELO a \"Auto-Advance to Deliberating Backup\"\n  (fallback de 2 horas post fin de cita) — ambas consistentes con\n  docs/PHASE_LOGIC.md.\n\nGUARD CLAUSE\n  1. sourceRecordId (appointment) debe venir del trigger.\n  2. El appointment debe tener un client vinculado. Si no, SKIP sin error.\n  3. Si el appointment status === \"Cancelled\", SKIP — no se avanza el stage\n     de un appointment cancelado.\n  4. Si el cliente NO está exactamente en \"Pre-Appointment\", SKIP — esta\n     automation solo cubre esa transición específica, no retrocede ni\n     salta otras fases.\n\nOUTPUTS (output.set)\n  status          : \"SUCCESS\" | \"ERROR\"\n  client_id       : record ID del cliente evaluado, o null\n  stage_written   : \"Deliberating\" | null (null si no se escribió)\n  result_message  : resumen legible\n  error_message   : null en éxito\n  log_summary     : trace completo\n================================================================================\n*/\n\n// ─────────────────────────────────────────────────────────────────────────────\n// CONFIGURATION LAYER\n// ─────────────────────────────────────────────────────────────────────────────\n\nconst TABLE_IDS = {\n  APPOINTMENTS: 'tblvV7uKTCaFFekoR',\n  CLIENTS:      'tblLLUlDgJ4ktzF7c',\n};\n\nconst FIELDS_APPOINTMENTS = {\n  cleared: 'fldE1Ke90UVdyUFL1',\n  client:  'fldcVVGhEsnYRsbyR',\n  status:  'fldZTkJdTBhmcchTb',\n};\n\nconst FIELDS_CLIENTS = {\n  stage: 'fldLcxVZvI1rigBlh',\n};\n\nconst CONFIG = {\n  LOG_LEVEL: 'B',                    // A=minimal | B=audit (default) | C=debug\n  SOURCE_STAGE: 'Pre-Appointment',\n  TARGET_STAGE: 'Deliberating',\n  CANCELLED_STATUS_VALUE: 'Cancelled',\n};\n\n// ─────────────────────────────────────────────────────────────────────────────\n// LOGGER CLASS\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass Logger {\n  constructor(level = 'B') { this.level = level; this.entries = []; this._levels = { A: 1, B: 2, C: 3 }; }\n  _log(lvl, msg) { if (this._levels[this.level] >= this._levels[lvl]) { const e = `[${lvl}][${new Date().toISOString()}] ${msg}`; this.entries.push(e); console.log(e); } }\n  minimal(msg) { this._log('A', msg); }\n  audit(msg)   { this._log('B', msg); }\n  debug(msg)   { this._log('C', msg); }\n  error(msg)   { const e = `[ERR][${new Date().toISOString()}] ${msg}`; this.entries.push(e); console.error(e); }\n  step(n, msg) { this._log('B', `── STEP ${n}: ${msg}`); }\n  getSummary() { return this.entries.join('\\n'); }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// APPOINTMENTS REPOSITORY\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass AppointmentsRepository {\n  constructor(logger) { this.table = base.getTable(TABLE_IDS.APPOINTMENTS); this.logger = logger; }\n\n  async getById(recordId) {\n    this.logger.step(1, `Loading appointment → ${recordId}`);\n    const result = await this.table.selectRecordsAsync({ fields: Object.values(FIELDS_APPOINTMENTS) });\n    const record = result.records.find(r => r.id === recordId);\n    if (!record) throw new Error(`Appointment not found → recordId: ${recordId}`);\n    this.logger.audit(`Appointment loaded → ${recordId}`);\n    return record;\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// CLIENTS REPOSITORY\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass ClientsRepository {\n  constructor(logger) { this.table = base.getTable(TABLE_IDS.CLIENTS); this.logger = logger; }\n\n  async getById(clientId) {\n    this.logger.step(3, `Loading client → ${clientId}`);\n    const result = await this.table.selectRecordsAsync({ fields: [FIELDS_CLIENTS.stage] });\n    const record = result.records.find(r => r.id === clientId);\n    if (!record) throw new Error(`Client not found → clientId: ${clientId}`);\n    this.logger.audit(`Client loaded → ${clientId}`);\n    return record;\n  }\n\n  async writeStage(clientId, stageName) {\n    this.logger.step(5, `Writing stage=\"${stageName}\" → client: ${clientId}`);\n    await this.table.updateRecordAsync(clientId, { [FIELDS_CLIENTS.stage]: { name: stageName } });\n    this.logger.audit(`Stage written → ${stageName}`);\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// MESSAGE BUILDER\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass MessageBuilder {\n  static success(clientId, stageWritten) {\n    return stageWritten\n      ? `✅ DELIBERATING → client ${clientId} avanzado a \"Deliberating\".`\n      : `ℹ️ NO STAGE CHANGE → client ${clientId} no calificaba (no en Pre-Appointment, o appointment cancelado).`;\n  }\n  static skipped(reason) { return `⏭️ SKIPPED — ${reason}`; }\n  static error(err) { return `❌ DELIBERATING TRANSITION FAILED: ${err.message}`; }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// SERVICE — orquestador\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass DeliberatingTransitionService {\n  constructor(apptRepo, clientsRepo, logger) {\n    this.apptRepo = apptRepo;\n    this.clientsRepo = clientsRepo;\n    this.logger = logger;\n  }\n\n  async run(triggerRecordId) {\n    this.logger.audit(`Service started → appointment: ${triggerRecordId}`);\n\n    const appt = await this.apptRepo.getById(triggerRecordId);\n\n    // GUARD 3 — no avanzar si el appointment está cancelado\n    const status = appt.getCellValueAsString(FIELDS_APPOINTMENTS.status);\n    if (status === CONFIG.CANCELLED_STATUS_VALUE) {\n      return { status: 'SUCCESS', client_id: null, stage_written: null,\n        result_message: MessageBuilder.skipped(`Appointment está \"${CONFIG.CANCELLED_STATUS_VALUE}\".`) };\n    }\n\n    const linkedClients = appt.getCellValue(FIELDS_APPOINTMENTS.client) || [];\n    if (!linkedClients.length) {\n      return { status: 'SUCCESS', client_id: null, stage_written: null,\n        result_message: MessageBuilder.skipped('Appointment sin client vinculado.') };\n    }\n    const clientId = linkedClients[0].id;\n    this.logger.step(2, `Client resuelto → ${clientId}`);\n\n    // GUARD 4 — solo transiciona Pre-Appointment -> Deliberating\n    const clientRecord = await this.clientsRepo.getById(clientId);\n    const currentStage = clientRecord.getCellValueAsString(FIELDS_CLIENTS.stage);\n    if (currentStage !== CONFIG.SOURCE_STAGE) {\n      return { status: 'SUCCESS', client_id: clientId, stage_written: null,\n        result_message: MessageBuilder.skipped(`client stage actual es \"${currentStage}\", no \"${CONFIG.SOURCE_STAGE}\". No se toca.`) };\n    }\n\n    await this.clientsRepo.writeStage(clientId, CONFIG.TARGET_STAGE);\n\n    return {\n      status: 'SUCCESS', client_id: clientId, stage_written: CONFIG.TARGET_STAGE,\n      result_message: MessageBuilder.success(clientId, CONFIG.TARGET_STAGE),\n    };\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// MAIN EXECUTION BLOCK\n// input.config() llamado UNA vez, scope global, antes del try.\n// ─────────────────────────────────────────────────────────────────────────────\n\nconst cfg = input.config();\nconst triggerRecordId = cfg.recordId;\n\nconst logger = new Logger(CONFIG.LOG_LEVEL);\n\nlet result = {\n  status: 'ERROR', client_id: null, stage_written: null,\n  result_message: null, error_message: null,\n};\n\ntry {\n  if (!triggerRecordId) throw new Error(\n    'Missing required input: recordId. Ensure the trigger passes the appointment Record ID via input variable \"recordId\".'\n  );\n\n  logger.audit(`Automation started → recordId: ${triggerRecordId}`);\n\n  const service = new DeliberatingTransitionService(\n    new AppointmentsRepository(logger),\n    new ClientsRepository(logger),\n    logger\n  );\n\n  result = await service.run(triggerRecordId);\n  result.error_message = null;\n\n} catch (err) {\n  logger.error(`Automation failed → ${err.message}`);\n  result.error_message = err.message;\n  result.result_message = MessageBuilder.error(err);\n  throw err;\n\n} finally {\n  result.log_summary = logger.getSummary();\n}\n\noutput.set('status',         result.status);\noutput.set('client_id',      result.client_id);\noutput.set('stage_written',  result.stage_written);\noutput.set('result_message', result.result_message);\noutput.set('error_message',  result.error_message);\noutput.set('log_summary',    result.log_summary);\n\nlogger.audit(`Script complete → status: ${result.status} | stage_written: ${result.stage_written}`);","table":null,"tableLabel":null,"fieldsWritten":[],"fieldsLabels":[],"prompt":null,"model":null,"to":null,"subject":null,"message":null}],"subscribers":[{"name":"Axel Nava","email":"anava@singularagency.co","isServiceAccount":false}],"hasScript":true,"hasAi":false,"hasSlack":true,"inferred":true},{"id":"wflkYewOVmmi43mc7","name":"Client Arrival Slack","description":"This automation sends a Slack message when a record in the appointments table matches certain conditions. It helps keep team members informed about client arrivals, enhancing communication and operational efficiency.","status":"deployed","version":295,"trigger":{"typeId":"wttRECORDMATCHES0","label":"Record matches conditions","tableId":"tblvV7uKTCaFFekoR","tableLabel":"tblvV7uKTCaFFekoR","scheduleDetail":null},"steps":[{"type":"watSENDTOSLACK000","label":"Send Slack message","script":null,"table":null,"tableLabel":null,"fieldsWritten":[],"fieldsLabels":[],"prompt":null,"model":null,"to":"C04DAT5H50B","subject":null,"message":"{dynamic}, {dynamic} is here for their appointment. \nYou will be in {dynamic}."}],"subscribers":[{"name":"Axel Nava","email":"anava@singularagency.co","isServiceAccount":false}],"hasScript":false,"hasAi":false,"hasSlack":true,"inferred":true},{"id":"wfl6hMhwI9gPuaNPX","name":"No Alts/Order Ready - Update Phase to In Fulfillment","description":"This automation updates the phase of a record in the DF Clients table to 'In Ful l,"fieldsWritten":[],"fieldsLabels":[],"prompt":null,"model":null,"to":null,"subject":null,"message":null}]}]}],"subscribers":[{"name":"Julia Collins","email":"julia.shao.collins@daniellefrankelstudio.com","isServiceAccount":false}],"hasScript":false,"hasAi":false,"hasSlack":false,"inferred":true},{"id":"wfl1eLyu63HU8TWUp","name":"Auto-Advance to Deliberating Backup","description":"This automation automatically advances clients to the 'Deliberating Backup' phase when they enter a specific view. It helps in organizing client records for better tracking and follow-up.","status":"deployed","version":12,"trigger":{"typeId":"wttBRZzRXx3C2jyIc","label":"Record enters view","tableId":"tblvV7uKTCaFFekoR","tableLabel":"tblvV7uKTCaFFekoR","scheduleDetail":null},"steps":[{"type":"watUPDATERECORD00","label":"Update record","script":null,"table":"tblLLUlDgJ4ktzF7c","tableLabel":"tblLLUlDgJ4ktzF7c","fieldsWritten":[],"fieldsLabels":[],"prompt":null,"model":null,"to":null,"subject":null,"message":null}],"subscribers":[{"name":"Axel Nava","email":"anava@singularagency.co","isServiceAccount":false}],"hasScript":false,"hasAi":false,"hasSlack":false,"inferred":true},{"id":"wflHftTxnHum9cSMB","name":"When Address Present → Extract Country to Client Record","description":"This automation extracts the country from a client's address when it is present and updates the client record accordingly. It ensures that client information is complete and accurate for future communications.","status":"undeployed","version":35,"trigger":{"typeId":"wttRECORDMATCHES0","label":"Record matches conditions","tableId":"tblLLUlDgJ4ktzF7c","tableLabel":"tblLLUlDgJ4ktzF7c","scheduleDetail":null},"steps":[{"type":"watCUSTOMSCRIPT00","label":"Run script","script":"/*\n================================================================================\nAUTOMATION : Update - When Address Present → Extract Country to Client Record (Script)\nGROUP      : CRM - Client Data\nBASE       : appUC2NFAlURayLx9\nTABLE      : DF Clients (tblLLUlDgJ4ktzF7c)\nTRIGGER    : When record matches conditions (Shopify Address OR Acuity Address not empty)\nVERSION    : 1.0.0 — field IDs verified against live base\n================================================================================\n\nOBJECTIVE\n  Reads the Shopify Address or Acuity Address on a DF Clients record, extracts\n  the country from the last comma-separated segment, normalizes it against the\n  canonical country list, and writes the result to the country_of_residence field.\n  Shopify Address is preferred over Acuity Address when both are present.\n  Logs loudly as an error if no country match is found.\n\nPRIORITY\n  Shopify Address → Acuity Address (fallback)\n\nCOUNTRY NORMALIZATION\n  Both sources end with the country name as the last comma-separated token.\n  Shopify uses:  \"United States\", \"United Kingdom\", \"Canada\", \"Dominican Republic\"\n  Acuity uses:   \"United States of America\" (→ normalized to \"United States\"), same others\n  All values are trimmed and lowercased for matching, then written as canonical name.\n\nGUARD CLAUSE\n  Node 1 Condition: Shopify Address is not empty OR Acuity Address is not empty.\n  Secondary guard in script: if both fields resolve to empty strings after trim, \n  script exits cleanly with a warning (no error thrown — record just has no address yet).\n\nINPUT VARIABLES (Node 2 → Run a Script)\n  record_id  →  Record ID from trigger\n\nOUTPUTS (output.set)\n  status           : \"SUCCESS\" | \"SKIPPED\" | \"ERROR\"\n  country_written  : canonical country name written, or null\n  source_used      : \"shopify\" | \"acuity\" | null\n  raw_address      : the full address string used\n  raw_token        : the last comma token before normalization\n  result_message   : human-readable summary\n  log_summary      : full step-by-step trace\n================================================================================\n*/\n\n// ─────────────────────────────────────────────────────────────────────────────\n// CONFIGURATION LAYER\n// ─────────────────────────────────────────────────────────────────────────────\n\nconst TABLE_IDS = {\n  CLIENTS: 'tblLLUlDgJ4ktzF7c',\n};\n\n// DF Clients fields used by this script\nconst FIELDS = {\n  SHOPIFY_ADDRESS    : 'fldxFbYURZvlZ0tA1',  // singleLineText\n  ACUITY_ADDRESS     : 'fldkpfulLIk0jq34d',  // singleLineText\n  COUNTRY_OF_RESIDENCE: 'flduQb1j7LceNZuC8', // singleLineText (target)\n};\n\nconst CONFIG = {\n  LOG_LEVEL: 'B', // A=minimal | B=audit | C=debug\n};\n\n// ─────────────────────────────────────────────────────────────────────────────\n// COUNTRY NORMALIZATION MAP\n// Key: lowercase last token from address string\n// Value: canonical country name string to write\n// Add entries here as new countries appear in the data.\n// ─────────────────────────────────────────────────────────────────────────────\n\nconst COUNTRY_MAP = {\n  // United States — Shopify and Acuity use different spellings\n  'united states'             : 'United States',\n  'united states of america'  : 'United States',\n  'usa'                       : 'United States',\n  'us'                        : 'United States',\n\n  // United Kingdom\n  'united kingdom'            : 'United Kingdom',\n  'uk'                        : 'United Kingdom',\n  'england'                   : 'United Kingdom',\n  'great britain'             : 'United Kingdom',\n\n  // Canada\n  'canada'                    : 'Canada',\n\n  // Dominican Republic\n  'dominican republic'        : 'Dominican Republic',\n  'república dominicana'      : 'Dominican Republic',\n\n  // Guatemala\n  'guatemala'                 : 'Guatemala',\n\n  // ── Add more entries as new countries appear in error logs ──\n};\n\n// ─────────────────────────────────────────────────────────────────────────────\n// LOGGER CLASS\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass Logger {\n  constructor(level = 'B') {\n    this.level   = level;\n    this.entries = [];\n    this._levels = { A: 1, B: 2, C: 3 };\n  }\n  _log(lvl, msg) {\n    if (this._levels[this.level] >= this._levels[lvl]) {\n      const e = `[${lvl}][${new Date().toISOString()}] ${msg}`;\n      this.entries.push(e);\n      console.log(e);\n    }\n  }\n  minimal(msg) { this._log('A', msg); }\n  audit(msg)   { this._log('B', msg); }\n  debug(msg)   { this._log('C', msg); }\n  error(msg) {\n    const e = `[ERR][${new Date().toISOString()}] ${msg}`;\n    this.entries.push(e);\n    console.error(e);\n  }\n  step(n, msg) { this._log('B', `── STEP ${n}: ${msg}`); }\n  getSummary() { return this.entries.join('\\n'); }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// COUNTRY EXTRACTOR CLASS\n// Pure logic — no Airtable API calls. No side effects.\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass CountryExtractor {\n  constructor(logger) {\n    this.logger = logger;\n  }\n\n  /**\n   * Extracts and normalizes the country from a comma-separated address string.\n   * The country is always the last comma-separated segment.\n   * Returns { canonical, rawToken } or null if no match found.\n   */\n  extract(address) {\n    if (!address || !address.trim()) return null;\n\n    const parts    = address.split(',');\n    const rawToken = parts[parts.length - 1].trim();\n    const key      = rawToken.toLowerCase();\n\n    this.logger.debug(`Extracting from raw token: \"${rawToken}\" (key: \"${key}\")`);\n\n    const canonical = COUNTRY_MAP[key] ?? null;\n    return { canonical, rawToken };\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// CLIENT REPOSITORY CLASS\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass ClientRepository {\n  constructor(logger) {\n    this.table  = base.getTable(TABLE_IDS.CLIENTS);\n    this.logger = logger;\n  }\n\n  async getById(recordId) {\n    this.logger.step(1, `Loading client record → ${recordId}`);\n    const result = await this.table.selectRecordsAsync({\n      fields: Object.values(FIELDS),\n    });\n    const record = result.records.find(r => r.id === recordId);\n    if (!record) throw new Error(`Client record not found → recordId: ${recordId}`);\n    this.logger.audit(`Record loaded → ${recordId}`);\n    return record;\n  }\n\n  async writeCountry(recordId, canonicalCountry) {\n    this.logger.step(4, `Writing country → \"${canonicalCountry}\" to record ${recordId}`);\n    await this.table.updateRecordAsync(recordId, {\n      [FIELDS.COUNTRY_OF_RESIDENCE]: canonicalCountry,\n    });\n    this.logger.audit(`Country written → ${canonicalCountry}`);\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// COUNTRY SERVICE CLASS\n// Orchestrates: load record → resolve address → extract country → write result\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass CountryService {\n  constructor(repo, extractor, logger) {\n    this.repo      = repo;\n    this.extractor = extractor;\n    this.logger    = logger;\n  }\n\n  async run(recordId) {\n    this.logger.audit(`CountryService started → record: ${recordId}`);\n\n    // Step 1 — Load record\n    const record = await this.repo.getById(recordId);\n\n    // Step 2 — Read address fields\n    const shopifyAddress = record.getCellValue(FIELDS.SHOPIFY_ADDRESS)?.trim() ?? '';\n    const acuityAddress  = record.getCellValue(FIELDS.ACUITY_ADDRESS)?.trim()  ?? '';\n\n    this.logger.step(2, `Shopify Address: ${shopifyAddress ? `\"${shopifyAddress.substring(0,60)}...\"` : '(empty)'}`);\n    this.logger.step(2, `Acuity Address:  ${acuityAddress  ? `\"${acuityAddress.substring(0,60)}...\"` : '(empty)'}`);\n\n    if (!shopifyAddress && !acuityAddress) {\n      this.logger.audit('Both address fields are empty — skipping record.');\n      return {\n        status          : 'SKIPPED',\n        country_written : null,\n        source_used     : null,\n        raw_address     : null,\n        raw_token       : null,\n        result_message  : 'SKIPPED: Both Shopify Address and Acuity Address are empty.',\n      };\n    }\n\n    // Step 3 — Resolve which address to use (Shopify preferred)\n    let sourceUsed  = null;\n    let rawAddress  = null;\n    let extraction  = null;\n\n    if (shopifyAddress) {\n      this.logger.step(3, 'Attempting extraction from Shopify Address (preferred source)');\n      extraction = this.extractor.extract(shopifyAddress);\n      if (extraction?.canonical) {\n        sourceUsed = 'shopify';\n        rawAddress = shopifyAddress;\n      } else {\n        this.logger.audit(\n          `Shopify Address present but country not recognized → raw token: \"${extraction?.rawToken}\". Falling back to Acuity.`\n        );\n      }\n    }\n\n    // Fallback to Acuity if Shopify didn't resolve\n    if (!extraction?.canonical && acuityAddress) {\n      this.logger.step(3, 'Attempting extraction from Acuity Address (fallback source)');\n      extraction = this.extractor.extract(acuityAddress);\n      if (extraction?.canonical) {\n        sourceUsed = 'acuity';\n        rawAddress = acuityAddress;\n      }\n    }\n\n    // Step 4 — Handle no-match\n    if (!extraction?.canonical) {\n      const shopifyToken = shopifyAddress\n        ? this.extractor.extract(shopifyAddress)?.rawToken ?? '(parse failed)'\n        : '(empty)';\n      const acuityToken = acuityAddress\n        ? this.extractor.extract(acuityAddress)?.rawToken ?? '(parse failed)'\n        : '(empty)';\n\n      const errorMsg =\n        `❌ COUNTRY NOT RECOGNIZED — record: ${recordId} | ` +\n        `Shopify last token: \"${shopifyToken}\" | ` +\n        `Acuity last token: \"${acuityToken}\" | ` +\n        `Action required: Add the country to COUNTRY_MAP in the script.`;\n\n      this.logger.error(errorMsg);\n\n      // Throw so automation is marked FAILED and run log is visible\n      throw new Error(errorMsg);\n    }\n\n    // Step 4 — Write country to record\n    await this.repo.writeCountry(recordId, extraction.canonical);\n\n    const resultMessage =\n      `✅ COUNTRY EXTRACTED → \"${extraction.canonical}\" | ` +\n      `Source: ${sourceUsed} | ` +\n      `Raw token: \"${extraction.rawToken}\" | ` +\n      `Record: ${recordId}`;\n\n    this.logger.minimal(resultMessage);\n\n    return {\n      status          : 'SUCCESS',\n      country_written : extraction.canonical,\n      source_used     : sourceUsed,\n      raw_address     : rawAddress,\n      raw_token       : extraction.rawToken,\n      result_message  : resultMessage,\n    };\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// MAIN EXECUTION BLOCK\n// input.config() called ONCE — never inside try block\n// ─────────────────────────────────────────────────────────────────────────────\n\nconst cfg      = input.config();\nconst recordId = cfg.record_id;\n\nconst logger = new Logger(CONFIG.LOG_LEVEL);\n\nlet result = {\n  status          : 'ERROR',\n  country_written : null,\n  source_used     : null,\n  raw_address     : null,\n  raw_token       : null,\n  result_message  : null,\n  log_summary     : null,\n};\n\ntry {\n  if (!recordId) throw new Error(\n    'Missing required input: record_id. ' +\n    'Ensure the automation trigger passes the record ID via input variable \"record_id\".'\n  );\n\n  logger.audit(`Automation started → record_id: ${recordId}`);\n\n  const repo      = new ClientRepository(logger);\n  const extractor = new CountryExtractor(logger);\n  const service   = new CountryService(repo, extractor, logger);\n\n  result = await service.run(recordId);\n\n} catch (err) {\n  logger.error(`Automation failed → ${err.message}`);\n  result.result_message = err.message;\n  // Re-throw → Airtable marks run as FAILED, native notification fires\n  throw err;\n\n} finally {\n  result.log_summary = logger.getSummary();\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// OUTPUTS — Only reached on SUCCESS or SKIPPED (catch re-throws on ERROR)\n// ─────────────────────────────────────────────────────────────────────────────\n\noutput.set('status',          result.status);\noutput.set('country_written', result.country_written);\noutput.set('source_used',     result.source_used);\noutput.set('raw_address',     result.raw_address);\noutput.set('raw_token',       result.raw_token);\noutput.set('result_message',  result.result_message);\noutput.set('log_summary',     result.log_summary);\n\nlogger.audit(`Script complete → status: ${result.status} | country: ${result.country_written}`);","table":null,"tableLabel":null,"fieldsWritten":[],"fieldsLabels":[],"prompt":null,"model":null,"to":null,"subject":null,"message":null}],"subscribers":[],"hasScript":true,"hasAi":false,"hasSlack":false,"inferred":true},{"id":"wflGl6iduVmT5NPFx","name":"Copy Attachment → DF Clients — Record Created","description":"This automation copies attachments from a newly created record in the Attachments table to the DF Clients table. It ensures that all relevant documents are associated with the correct client records.","status":"deployed","version":37,"trigger":{"typeId":"wttRECORDCREATED0","label":"Record created","tableId":"tbli57E9YzWb5Qmku","tableLabel":"tbli57E9YzWb5Qmku","scheduleDetail":null},"steps":[{"type":"watCUSTOMSCRIPT00","label":"Run script","script":"/*\n================================================================================\nAUTOMATION : Copy Attachment → DF Clients / Proposals — Record Created\nBASE       : app6Q4xMZ1ngJxiV8 (sandbox — see note below)\nTABLE SRC  : Attachments  (tbli57E9YzWb5Qmku)\nTABLE DST  : DF_Clients   (tblLLUlDgJ4ktzF7c)  — Measurements / Appointment Photos\n             proposals    (tblP7tVuCuXMzI4ir)  — Customization Proposal / Signed Proposal\nTRIGGER    : When record is created in Attachments\nVERSION    : 1.2.0 — added Customization Proposal / Signed Proposal routing on\n                     top of the existing Measurements / Appointment Photos\n                     flow. attachments.customization_proposal links directly\n                     to the Proposals table (not via Customizations), so a\n                     Proposal is fetched by ID directly — no search/matching\n                     needed. All field IDs verified against live base + the\n                     customer_journey DBML schema export.\n\nNOTE ON BASE: this automation must live on the SANDBOX base, because the\nRecap interface (Generate Proposal / Upload Signed Document) still runs\nagainst sandbox — the Proposals records this needs to update only exist\nthere. Recreate on production, pointing at the production Proposals table,\nonce that interface is published.\n\nOBJECTIVE\n  When a new record is created in the Attachments table (via the \"Add\n  Attachment\" interface form), this automation reads the uploaded files and\n  the selected type, then routes them to one of two destinations depending\n  on that type:\n\n    \"Measurements\" / \"Appointment Photos\"\n      → APPENDS the files to the corresponding attachment field on the\n        linked DF_Clients record. Existing attachments are never replaced.\n\n    \"Customization Proposal\" / \"Signed Proposal\"\n      → WRITES the files onto the Proposals record linked directly via\n        customization_proposal, into unsigned_document or signed_document\n        respectively. A signed copy can only ever be attached to a Proposal\n        that already has its unsigned copy — see guard clause 4.\n\n  Either way, the staging Attachments record is deleted once its files have\n  been safely copied onto the real destination — it was only a transit\n  vehicle for the upload, never permanent storage.\n\nGUARD CLAUSE\n  Enforced in script _validate() AND recommended upstream in a Condition node:\n  1. type field must be set and recognised — one of the four values below\n  2. attachments field must not be empty — nothing to copy if no files uploaded\n  3. (Measurements / Appointment Photos) client field must not be empty\n  4. (Customization Proposal / Signed Proposal) customization_proposal must\n     not be empty and must point at a Proposal that exists, AND that Proposal\n     must be at the right stage:\n       - Customization Proposal → no restriction (unsigned_document is set/\n                                   overwritten regardless of current value)\n       - Signed Proposal        → the Proposal must already have\n                                   unsigned_document set\n\nFIELD MAPPING\n  type = \"Measurements\"        → DF_Clients.Measurements       (fldcWwbKOc9nkgzzV)\n  type = \"Appointment Photos\"  → DF_Clients.Appointment_Photos (fldWti8XzHbnGcjz9)\n  type = \"Customization Proposal\" → proposals.unsigned_document (fldlUFhODjgDyeOFg)\n  type = \"Signed Proposal\"        → proposals.signed_document + status=Signed\n\nATTACHMENT COPY NOTE\n  Attachments are copied as { url } only (no filename) — the same shape this\n  script has always used for the DF_Clients route, kept consistent for the\n  Proposals route too. An attachment already stored on an Airtable record\n  has a real https url (Airtable's own CDN) that Airtable can re-fetch when\n  writing it into another field — this is the standard way automation\n  scripts move attachments between tables.\n\nERROR HANDLING\n  Errors thrown with descriptive messages. Catch block re-throws so Airtable\n  marks the automation run as FAILED and sends the native email notification.\n\nOUTPUTS (output.set)\n  status         : \"SUCCESS\" | \"ERROR\"\n  client_id      : record ID of the updated client, or null (proposal route)\n  proposal_id    : record ID of the updated proposal, or null (client route)\n  files_appended : number of new files written\n  error_message  : null on success\n  log_summary    : full Logger output (B-level step trace)\n\nNODE SETUP\n  Node 1 — Trigger: When record is created → Attachments table\n  Node 2 — Condition (upstream guard — optional but recommended):\n             type is not empty\n             attachments is not empty\n  Node 3 — Run a Script\n             Input variable: recordId → Record ID (trigger)\n================================================================================\n*/\n\n// ─────────────────────────────────────────────────────────────────────────────\n// CONFIGURATION LAYER\n// ─────────────────────────────────────────────────────────────────────────────\n\nconst TABLE_IDS = {\n  ATTACHMENTS : 'tbli57E9YzWb5Qmku',\n  CLIENTS     : 'tblLLUlDgJ4ktzF7c',\n  PROPOSALS   : 'tblP7tVuCuXMzI4ir',\n};\n\n// Attachments table fields (tbli57E9YzWb5Qmku)\nconst FIELDS_ATTACHMENTS = {\n  client               : 'fldTESnHcalw4JlbA', // multipleRecordLinks → DF_Clients\n  type                 : 'fld39kLMqKEZucDXe', // singleSelect\n  attachments          : 'fldBgFSXBWHlejuEK', // multipleAttachments\n  customization_proposal: 'fldp6Cq7466RvRgij', // multipleRecordLinks → proposals (direct)\n};\n\n// Target field on DF_Clients per type value (type option name → field ID)\nconst CLIENTS_TARGET_FIELD = {\n  'Measurements'       : 'fldcWwbKOc9nkgzzV', // multipleAttachments\n  'Appointment Photos' : 'fldWti8XzHbnGcjz9', // multipleAttachments\n};\n\n// Proposals table fields (tblP7tVuCuXMzI4ir)\nconst FIELDS_PROPOSALS = {\n  unsigned_document    : 'fldlUFhODjgDyeOFg', // multipleAttachments\n  signed_document      : 'fld1Z37faYGD7jDia', // multipleAttachments\n  status               : 'fldW0GbVWnhZGUAtv', // singleSelect: Generated | Signed\n};\n\nconst CLIENT_TYPES   = new Set(['Measurements', 'Appointment Photos']);\nconst PROPOSAL_TYPES = new Set(['Customization Proposal', 'Signed Proposal']);\n\nconst CONFIG = {\n  LOG_LEVEL : 'B', // A=minimal | B=audit (default) | C=debug\n};\n\n// ─────────────────────────────────────────────────────────────────────────────\n// LOGGER CLASS\n// Levels: A=minimal (errors + final result only)\n//         B=audit   (default — step-by-step trace)\n//         C=debug   (verbose — payload details)\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass Logger {\n  constructor(level = 'B') {\n    this.level   = level;\n    this.entries = [];\n    this._levels = { A: 1, B: 2, C: 3 };\n  }\n  _log(lvl, msg) {\n    if (this._levels[this.level] >= this._levels[lvl]) {\n      const e = `[${lvl}][${new Date().toISOString()}] ${msg}`;\n      this.entries.push(e);\n      console.log(e);\n    }\n  }\n  minimal(msg) { this._log('A', msg); }\n  audit(msg)   { this._log('B', msg); }\n  debug(msg)   { this._log('C', msg); }\n  error(msg)   {\n    const e = `[ERR][${new Date().toISOString()}] ${msg}`;\n    this.entries.push(e);\n    console.error(e);\n  }\n  step(n, msg) { this._log('B', `── STEP ${n}: ${msg}`); }\n  getSummary() { return this.entries.join('\\n'); }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// ATTACHMENTS REPOSITORY CLASS\n// Read-only access to the Attachments table (the trigger record) + delete\n// once its files are safely copied to the real destination.\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass AttachmentsRepository {\n  constructor(logger) {\n    this.table  = base.getTable(TABLE_IDS.ATTACHMENTS);\n    this.logger = logger;\n  }\n\n  async getById(recordId) {\n    this.logger.step(1, `Loading Attachments record → ${recordId}`);\n    const result = await this.table.selectRecordsAsync({\n      fields: Object.values(FIELDS_ATTACHMENTS),\n    });\n    const record = result.records.find(r => r.id === recordId);\n    if (!record) throw new Error(\n      `Attachments record not found → recordId: ${recordId}`\n    );\n    this.logger.audit(`Attachments record loaded → ${recordId}`);\n    return record;\n  }\n\n  async deleteRecord(recordId) {\n    this.logger.step(6, `Deleting staging record → ${recordId}`);\n    await this.table.deleteRecordAsync(recordId);\n    this.logger.audit(`Staging record deleted → ${recordId}`);\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// CLIENTS REPOSITORY CLASS\n// Read and write access to the DF_Clients table (Measurements / Appointment\n// Photos route).\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass ClientsRepository {\n  constructor(logger) {\n    this.table  = base.getTable(TABLE_IDS.CLIENTS);\n    this.logger = logger;\n  }\n\n  async getById(clientId, targetFieldId) {\n    this.logger.step(3, `Loading Client record → ${clientId}`);\n    const result = await this.table.selectRecordsAsync({\n      fields: [targetFieldId],\n    });\n    const record = result.records.find(r => r.id === clientId);\n    if (!record) throw new Error(\n      `Client record not found → clientId: ${clientId}`\n    );\n    this.logger.audit(`Client record loaded → ${clientId}`);\n    return record;\n  }\n\n  async appendAttachments(clientId, targetFieldId, existingAttachments, newAttachments) {\n    this.logger.step(5, `Appending ${newAttachments.length} file(s) → field: ${targetFieldId} | client: ${clientId}`);\n\n    // Pass only { url } — the only property accepted by Airtable for both\n    // existing and new entries when writing to a multipleAttachments field.\n    const existingMapped = (existingAttachments ?? []).map(a => ({ url: a.url }));\n    const newMapped      = newAttachments.map(a => ({ url: a.url }));\n    const combined       = [...existingMapped, ...newMapped];\n\n    this.logger.debug(`Existing: ${existingMapped.length} | New: ${newMapped.length} | Total: ${combined.length}`);\n\n    await this.table.updateRecordAsync(clientId, {\n      [targetFieldId]: combined,\n    });\n\n    this.logger.audit(`Attachments written → total in field: ${combined.length}`);\n    return combined.length;\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// PROPOSALS REPOSITORY CLASS\n// Read and write access to the proposals table (Customization Proposal /\n// Signed Proposal route). attachments.customization_proposal links directly\n// to the target Proposal record — no search/matching needed, just a fetch by\n// ID (same pattern as ClientsRepository.getById).\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass ProposalsRepository {\n  constructor(logger) {\n    this.table  = base.getTable(TABLE_IDS.PROPOSALS);\n    this.logger = logger;\n  }\n\n  async getById(proposalId) {\n    this.logger.step(3, `Loading Proposal record → ${proposalId}`);\n    const result = await this.table.selectRecordsAsync({\n      fields: [FIELDS_PROPOSALS.unsigned_document, FIELDS_PROPOSALS.signed_document],\n    });\n    const record = result.records.find(r => r.id === proposalId);\n    if (!record) throw new Error(\n      `Proposal record not found → proposalId: ${proposalId}`\n    );\n    this.logger.audit(`Proposal record loaded → ${proposalId}`);\n    return record;\n  }\n\n  async writeUnsignedDocument(proposalId, attachments) {\n    this.logger.step(5, `Writing unsigned_document → proposal: ${proposalId} | files: ${attachments.length}`);\n    const mapped = attachments.map(a => ({ url: a.url }));\n    await this.table.updateRecordAsync(proposalId, {\n      [FIELDS_PROPOSALS.unsigned_document]: mapped,\n    });\n    this.logger.audit(`unsigned_document written → ${mapped.length} file(s)`);\n  }\n\n  async writeSignedDocument(proposalId, attachments) {\n    this.logger.step(5, `Writing signed_document + status=Signed → proposal: ${proposalId} | files: ${attachments.length}`);\n    const mapped = attachments.map(a => ({ url: a.url }));\n    await this.table.updateRecordAsync(proposalId, {\n      [FIELDS_PROPOSALS.signed_document]: mapped,\n      [FIELDS_PROPOSALS.status]: { name: 'Signed' },\n    });\n    this.logger.audit(`signed_document + status written → ${mapped.length} file(s)`);\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// ATTACHMENT PROPAGATION SERVICE\n// Orchestrates all steps: load → validate/route → write to the right\n// destination → delete the staging record.\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass AttachmentPropagationService {\n  constructor(attachmentsRepo, clientsRepo, proposalsRepo, logger) {\n    this.attachmentsRepo = attachmentsRepo;\n    this.clientsRepo     = clientsRepo;\n    this.proposalsRepo   = proposalsRepo;\n    this.logger          = logger;\n  }\n\n  _validate(record) {\n    this.logger.step(2, 'Running guard clause validation');\n\n    const typeCell = record.getCellValue(FIELDS_ATTACHMENTS.type);\n    const typeName = typeCell?.name ?? null;\n    if (!typeName) throw new Error(\n      'Guard clause: type field is not selected. Must be one of: Measurements, ' +\n      'Appointment Photos, Customization Proposal, Signed Proposal.'\n    );\n\n    const attachments = record.getCellValue(FIELDS_ATTACHMENTS.attachments);\n    if (!attachments || attachments.length === 0) throw new Error(\n      'Guard clause: attachments field is empty. Nothing to propagate.'\n    );\n\n    if (CLIENT_TYPES.has(typeName)) {\n      const linkedClients = record.getCellValue(FIELDS_ATTACHMENTS.client);\n      if (!linkedClients || linkedClients.length === 0) throw new Error(\n        'Guard clause: client field is empty. Cannot propagate without a linked client.'\n      );\n      const targetFieldId = CLIENTS_TARGET_FIELD[typeName];\n      this.logger.audit(\n        `Guard passed (client route) → client: ${linkedClients[0].id} | type: ${typeName} | files: ${attachments.length}`\n      );\n      return { route: 'client', clientId: linkedClients[0].id, typeName, targetFieldId, newAttachments: attachments };\n    }\n\n    if (PROPOSAL_TYPES.has(typeName)) {\n      const linkedProposal = record.getCellValue(FIELDS_ATTACHMENTS.customization_proposal);\n      if (!linkedProposal || linkedProposal.length === 0) throw new Error(\n        'Guard clause: customization_proposal field is empty. Cannot find the Proposal to attach to.'\n      );\n      this.logger.audit(\n        `Guard passed (proposal route) → proposal: ${linkedProposal[0].id} | type: ${typeName} | files: ${attachments.length}`\n      );\n      return { route: 'proposal', proposalId: linkedProposal[0].id, typeName, newAttachments: attachments };\n    }\n\n    throw new Error(\n      `Guard clause: unknown type value \"${typeName}\". Expected one of: Measurements, ` +\n      `Appointment Photos, Customization Proposal, Signed Proposal.`\n    );\n  }\n\n  async _runClientRoute({ clientId, typeName, targetFieldId, newAttachments }) {\n    const clientRecord = await this.clientsRepo.getById(clientId, targetFieldId);\n    this.logger.step(4, `Reading existing attachments from field: ${targetFieldId}`);\n    const existingAttachments = clientRecord.getCellValue(targetFieldId);\n    this.logger.audit(`Existing count: ${existingAttachments?.length ?? 0}`);\n    const totalFiles = await this.clientsRepo.appendAttachments(\n      clientId, targetFieldId, existingAttachments, newAttachments\n    );\n    return { client_id: clientId, proposal_id: null, type: typeName, files_appended: newAttachments.length, total_files: totalFiles };\n  }\n\n  async _runProposalRoute({ proposalId, typeName, newAttachments }) {\n    const proposalRecord = await this.proposalsRepo.getById(proposalId);\n    const isSigned = typeName === 'Signed Proposal';\n\n    if (isSigned) {\n      const existingUnsigned = proposalRecord.getCellValue(FIELDS_PROPOSALS.unsigned_document);\n      const hasUnsigned = !!existingUnsigned && existingUnsigned.length > 0;\n      if (!hasUnsigned) throw new Error(\n        `Guard clause: Proposal ${proposalId} does not have unsigned_document yet — a signed copy ` +\n        `cannot be attached before the unsigned one exists.`\n      );\n      await this.proposalsRepo.writeSignedDocument(proposalId, newAttachments);\n    } else {\n      await this.proposalsRepo.writeUnsignedDocument(proposalId, newAttachments);\n    }\n\n    return { client_id: null, proposal_id: proposalId, type: typeName, files_appended: newAttachments.length, total_files: newAttachments.length };\n  }\n\n  async run(attachmentsRecordId) {\n    this.logger.audit(`Service started → record: ${attachmentsRecordId}`);\n\n    // Step 1 — Load the Attachments record\n    const attachmentsRecord = await this.attachmentsRepo.getById(attachmentsRecordId);\n\n    // Step 2 — Validate guard clauses and pick a route\n    const validated = this._validate(attachmentsRecord);\n\n    // Steps 3-5 — Load destination, read existing (client route only), write\n    const outcome = validated.route === 'client'\n      ? await this._runClientRoute(validated)\n      : await this._runProposalRoute(validated);\n\n    // Step 6 — Delete the staging record from the Attachments table. It was\n    // only a transit vehicle for the uploaded files; once they're safely\n    // written to the real destination it is no longer needed.\n    await this.attachmentsRepo.deleteRecord(attachmentsRecordId);\n\n    this.logger.minimal(\n      `SUCCESS → route: ${validated.route} | client: ${outcome.client_id ?? '—'} | proposal: ${outcome.proposal_id ?? '—'} | ` +\n      `type: ${outcome.type} | appended: ${outcome.files_appended} | staging record deleted`\n    );\n\n    return {\n      status         : 'SUCCESS',\n      client_id      : outcome.client_id,\n      proposal_id    : outcome.proposal_id,\n      files_appended : outcome.files_appended,\n      error_message  : null,\n    };\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// MAIN EXECUTION BLOCK\n// input.config() called ONCE — global scope, before the try block.\n// Variables declared before try so the catch block has access to them.\n// ─────────────────────────────────────────────────────────────────────────────\n\n// !! input.config() MUST be here — NEVER inside the try block !!\nconst cfg                 = input.config();\nconst attachmentsRecordId = cfg.recordId;\n\nconst logger = new Logger(CONFIG.LOG_LEVEL);\n\nlet result = {\n  status         : 'ERROR',\n  client_id      : null,\n  proposal_id    : null,\n  files_appended : 0,\n  error_message  : null,\n};\n\ntry {\n  if (!attachmentsRecordId) throw new Error(\n    'Missing required input: recordId. ' +\n    'Ensure the trigger passes the Attachments record ID via input.config().'\n  );\n\n  logger.audit(`Automation started → recordId: ${attachmentsRecordId}`);\n\n  const service = new AttachmentPropagationService(\n    new AttachmentsRepository(logger),\n    new ClientsRepository(logger),\n    new ProposalsRepository(logger),\n    logger\n  );\n\n  result = await service.run(attachmentsRecordId);\n\n} catch (err) {\n  logger.error(`Automation failed → ${err.message}`);\n  result.error_message = err.message;\n\n  // !! CRITICAL — re-throw so Airtable marks the automation run as FAILED !!\n  // output.set() alone does NOT fail the automation — Airtable only marks a run\n  // as failed when the script exits with an uncaught error. Without this throw,\n  // the automation shows \"Ran successfully\" even when status = ERROR.\n  throw err;\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// OUTPUTS — Only reached on SUCCESS (catch block re-throws on error)\n// ─────────────────────────────────────────────────────────────────────────────\n\noutput.set('status',         result.status);\noutput.set('client_id',      result.client_id);\noutput.set('proposal_id',    result.proposal_id);\noutput.set('files_appended', result.files_appended);\noutput.set('error_message',  result.error_message);\noutput.set('log_summary',    logger.getSummary());\n\nlogger.audit(`Script complete → status: ${result.status} | files appended: ${result.files_appended}`);","table":null,"tableLabel":null,"fieldsWritten":[],"fieldsLabels":[],"prompt":null,"model":null,"to":null,"subject":null,"message":null}],"subscribers":[{"name":"Axel Nava","email":"anava@singularagency.co","isServiceAccount":false}],"hasScript":true,"hasAi":false,"hasSlack":false,"inferred":true},{"id":"wflkAP4fhaoOjzyg4","name":"Lock Previous Drafts on New Draft Created","description":"This automation locks previous drafts when a new draft is created. It prevents confusion and maintains the integrity of draft orders by ensuring only the latest draft is active.","status":"deployed","version":15,"trigger":{"typeId":"wttRECORDCREATED0","label":"Record created","tableId":"tblp7foUmlN9823WW","tableLabel":"tblp7foUmlN9823WW","scheduleDetail":null},"steps":[{"type":"watCUSTOMSCRIPT00","label":"Run script","script":"/*\n================================================================================\nAUTOMATION : Draft Orders — Lock Previous Drafts on New Draft Created\nBASE       : app6Q4xMZ1ngJxiV8 (Danielle Frankel DTC Customers)\nTABLE SRC  : draft_orders (tblp7foUmlN9823WW)\nTRIGGER    : Record created — draft_orders\nVERSION    : 1.0.0 — all field IDs verified against live base\n================================================================================\n\nOBJECTIVE\n  Whenever a new draft_orders record is created for a client, this automation\n  finds every OTHER draft_orders record already linked to that same client and,\n  for any of them not already locked, sets locked = true. This keeps only the\n  newest draft per client editable in the Draft Orders interface, and makes the\n  `locked` checkbox the single source of truth for editability (the interface\n  no longer relies on \"is this the most recent draft\" — see draft_orders.tsx).\n\n  This automation does NOT create any audit/snapshot record and has no\n  versioning concept, so it intentionally omits VersionManager, AuditRepository,\n  and SnapshotMapper from the standard template — there is nothing to snapshot\n  here, only a cascade update on sibling records of the same table.\n\nGUARD CLAUSE\n  Enforced via Condition node upstream AND secondary guard in script:\n  1. client must not be empty on the triggering record — a draft with no\n     linked client has no siblings to lock and nothing to cascade\n\nERROR HANDLING\n  Errors are thrown with descriptive messages. Airtable's native automation\n  failure notification alerts the automation owner. No Send Email node needed.\n\nOUTPUTS (output.set)\n  status          : \"SUCCESS\" | \"ERROR\"\n  triggering_id   : record ID of the newly created draft\n  client_name     : name of the linked client (from the triggering record)\n  locked_count    : number of sibling drafts that were locked\n  skipped_count   : number of sibling drafts already locked (left untouched)\n  result_message  : human-readable summary\n  error_message   : null on success\n  log_summary     : full Logger output\n================================================================================\n*/\n\n// ─────────────────────────────────────────────────────────────────────────────\n// CONFIGURATION LAYER\n// ─────────────────────────────────────────────────────────────────────────────\n\nconst TABLE_IDS = {\n  DRAFT_ORDERS: 'tblp7foUmlN9823WW',\n};\n\n// draft_orders fields\nconst FIELDS_DRAFT_ORDERS = {\n  draft_id : 'fldXiofTxlsl3NSro', // formula — used only for logging/messages\n  client   : 'fldV0tUFndHpPYqDD', // multipleRecordLinks -> DF Clients\n  locked   : 'fldTcFzPYNKajZepk', // checkbox\n};\n\nconst CONFIG = {\n  LOG_LEVEL: 'B', // A=minimal | B=audit (default) | C=debug\n};\n\n// ─────────────────────────────────────────────────────────────────────────────\n// LOGGER CLASS\n// Levels: A=minimal (errors + final result only)\n//         B=audit (default — step-by-step trace)\n//         C=debug (verbose — payload details)\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass Logger {\n  constructor(level = 'B') {\n    this.level = level;\n    this.entries = [];\n    this._levels = { A: 1, B: 2, C: 3 };\n  }\n  _log(lvl, msg) {\n    if (this._levels[this.level] >= this._levels[lvl]) {\n      const e = `[${lvl}][${new Date().toISOString()}] ${msg}`;\n      this.entries.push(e);\n      console.log(e);\n    }\n  }\n  minimal(msg) { this._log('A', msg); }\n  audit(msg) { this._log('B', msg); }\n  debug(msg) { this._log('C', msg); }\n  error(msg) {\n    const e = `[ERR][${new Date().toISOString()}] ${msg}`;\n    this.entries.push(e);\n    console.error(e);\n  }\n  step(n, msg) { this._log('B', `── STEP ${n}: ${msg}`); }\n  getSummary() { return this.entries.join('\\n'); }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// DRAFT ORDERS REPOSITORY\n// All reads and writes on draft_orders. No other tables involved.\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass DraftOrdersRepository {\n  constructor(logger) {\n    this.table = base.getTable(TABLE_IDS.DRAFT_ORDERS);\n    this.logger = logger;\n  }\n\n  async getById(recordId) {\n    this.logger.step(1, `Loading triggering record → ${recordId}`);\n    const record = await this.table.selectRecordAsync(recordId, {\n      fields: Object.values(FIELDS_DRAFT_ORDERS),\n    });\n    if (!record) throw new Error(`Triggering record not found → recordId: ${recordId}`);\n    this.logger.audit(`Record loaded → ${recordId}`);\n    return record;\n  }\n\n  async getSiblingDrafts(clientRecordId, excludeRecordId) {\n    this.logger.step(3, `Loading sibling drafts for client → ${clientRecordId}`);\n    const result = await this.table.selectRecordsAsync({\n      fields: Object.values(FIELDS_DRAFT_ORDERS),\n    });\n    const siblings = result.records.filter(r => {\n      if (r.id === excludeRecordId) return false;\n      const linkedClients = r.getCellValue(FIELDS_DRAFT_ORDERS.client) || [];\n      return linkedClients.some(c => c.id === clientRecordId);\n    });\n    this.logger.audit(`Found ${siblings.length} sibling draft(s) for this client`);\n    return siblings;\n  }\n\n  async lockRecord(recordId) {\n    await this.table.updateRecordAsync(recordId, {\n      [FIELDS_DRAFT_ORDERS.locked]: true,\n    });\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// MESSAGE BUILDER\n// Builds the human-readable result_message / error_message for output.set().\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass MessageBuilder {\n  static success(clientName, lockedCount, skippedCount) {\n    return `Locked ${lockedCount} previous draft(s) for ${clientName}` +\n      (skippedCount > 0 ? ` (${skippedCount} already locked).` : '.');\n  }\n  static error(err) {\n    return `Failed to lock previous drafts: ${err.message}`;\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// LOCK CASCADE SERVICE\n// Orchestrates the guard clause, sibling lookup, and locking.\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass LockCascadeService {\n  constructor(repo, logger) {\n    this.repo = repo;\n    this.logger = logger;\n  }\n\n  _validate(record) {\n    // Condition 1 — client must be linked\n    const clientLink = record?.getCellValue(FIELDS_DRAFT_ORDERS.client);\n    if (!clientLink || !clientLink.length) {\n      throw new Error(\n        'Guard clause: client is not linked on the triggering record. ' +\n        'A draft with no client has no siblings to lock.'\n      );\n    }\n\n    const draftIdVal = record?.getCellValue(FIELDS_DRAFT_ORDERS.draft_id);\n    this.logger.step(2, `Guard passed → client: ${clientLink[0].name} | draft: ${draftIdVal ?? '(unnamed)'}`);\n\n    return {\n      clientId: clientLink[0].id,\n      clientName: clientLink[0].name,\n    };\n  }\n\n  async run(triggeringRecordId) {\n    const triggerRecord = await this.repo.getById(triggeringRecordId);\n    const { clientId, clientName } = this._validate(triggerRecord);\n\n    const siblings = await this.repo.getSiblingDrafts(clientId, triggeringRecordId);\n\n    this.logger.step(4, 'Locking unlocked sibling drafts');\n    let lockedCount = 0;\n    let skippedCount = 0;\n\n    for (const sibling of siblings) {\n      const alreadyLocked = !!sibling.getCellValue(FIELDS_DRAFT_ORDERS.locked);\n      if (alreadyLocked) {\n        skippedCount++;\n        continue;\n      }\n      await this.repo.lockRecord(sibling.id);\n      lockedCount++;\n      this.logger.audit(`Locked → ${sibling.id}`);\n    }\n\n    this.logger.step(5, `Done → locked: ${lockedCount} | already locked: ${skippedCount}`);\n\n    return { clientName, lockedCount, skippedCount };\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// MAIN EXECUTION BLOCK\n// ─────────────────────────────────────────────────────────────────────────────\n\nconst inputConfig = input.config();\nconst TRIGGERING_RECORD_ID = inputConfig.recordId;\n\nconst logger = new Logger(CONFIG.LOG_LEVEL);\nconst repo = new DraftOrdersRepository(logger);\nconst service = new LockCascadeService(repo, logger);\n\ntry {\n  if (!TRIGGERING_RECORD_ID) {\n    throw new Error('Guard clause: recordId was not provided in input.config().');\n  }\n\n  const { clientName, lockedCount, skippedCount } = await service.run(TRIGGERING_RECORD_ID);\n  const resultMessage = MessageBuilder.success(clientName, lockedCount, skippedCount);\n\n  output.set('status', 'SUCCESS');\n  output.set('triggering_id', TRIGGERING_RECORD_ID);\n  output.set('client_name', clientName);\n  output.set('locked_count', lockedCount);\n  output.set('skipped_count', skippedCount);\n  output.set('result_message', resultMessage);\n  output.set('error_message', null);\n  output.set('log_summary', logger.getSummary());\n} catch (error) {\n  logger.error(error.message);\n  output.set('status', 'ERROR');\n  output.set('triggering_id', TRIGGERING_RECORD_ID || null);\n  output.set('client_name', null);\n  output.set('locked_count', 0);\n  output.set('skipped_count', 0);\n  output.set('result_message', MessageBuilder.error(error));\n  output.set('error_message', error.message);\n  output.set('log_summary', logger.getSummary());\n  throw error; // re-throw so Airtable marks the automation run as FAILED\n}\n","table":null,"tableLabel":null,"fieldsWritten":[],"fieldsLabels":[],"prompt":null,"model":null,"to":null,"subject":null,"message":null}],"subscribers":[{"name":"Axel Nava","email":"anava@singularagency.co","isServiceAccount":false}],"hasScript":true,"hasAi":false,"hasSlack":false,"inferred":true},{"id":"wflUmK21YUsRY9XSz","name":"Pickup Status → Log Partial/Full Release Timestamp","description":"This automation logs the timestamp for partial or full release of an order when its pickup status is updated. It provides a clear record of order fulfillment progress.","status":"deployed","version":13,"trigger":{"typeId":"wttRECORDUPDATED0","label":"Record updated","tableId":"tblHFGbijtvZcRPkE","tableLabel":"tblHFGbijtvZcRPkE","scheduleDetail":null},"steps":[{"type":"watCUSTOMSCRIPT00","label":"Run script","script":"// ---------------------------------------------------------------------------\n// 1. CONFIGURATION LAYER\n// ---------------------------------------------------------------------------\nconst TABLE_IDS = {\n  ORDERS: 'tblHFGbijtvZcRPkE', // Orders - Shopify\n};\n\nconst FIELDS = {\n  FULFILLMENT_PROGRESS: 'fldKDT2x7wmZ2Suui', // formula, percent field → decimal fraction (1 = 100%)\n  PARTIAL_RELEASED_AT: 'fldscs1ay8WNRv72Z',  // dateTime\n  FULL_RELEASED_AT: 'fld5IBGMJqGIJDFdU',     // dateTime\n};\n\nconst CONFIG = {\n  FULL_THRESHOLD: 1,   // 100% as a decimal fraction\n  EPSILON: 0.0001,     // floating-point tolerance\n};\n\nconst triggerConfig = input.config();\n\n// ---------------------------------------------------------------------------\n// 2. Logger\n// ---------------------------------------------------------------------------\nclass Logger {\n  constructor() { this.steps = []; }\n  step(level, message) {\n    this.steps.push(`[${level}] ${message}`);\n    console.log(`[${level}] ${message}`);\n  }\n  getSummary() { return this.steps.join('\\n'); }\n}\n\n// ---------------------------------------------------------------------------\n// 3. DateManager\n// ---------------------------------------------------------------------------\nclass DateManager {\n  static nowISO() { return new Date().toISOString(); }\n}\n\n// ---------------------------------------------------------------------------\n// 4. OrderRepository\n// ---------------------------------------------------------------------------\nclass OrderRepository {\n  constructor(table, logger) {\n    this.table = table;\n    this.logger = logger;\n  }\n\n  async getById(recordId) {\n    this.logger.step('A', `Fetching order record ${recordId}`);\n    return await this.table.selectRecordAsync(recordId, {\n      fields: [FIELDS.FULFILLMENT_PROGRESS, FIELDS.PARTIAL_RELEASED_AT, FIELDS.FULL_RELEASED_AT],\n    });\n  }\n\n  async writeTimestamp(recordId, fieldId, isoString) {\n    this.logger.step('B', `Writing ${fieldId} = ${isoString} on ${recordId}`);\n    await this.table.updateRecordAsync(recordId, { [fieldId]: isoString });\n  }\n}\n\n// ---------------------------------------------------------------------------\n// 5. MessageBuilder\n// ---------------------------------------------------------------------------\nclass MessageBuilder {\n  static success(recordId, fieldWritten) {\n    return `OK — ${fieldWritten} stamped for record ${recordId}`;\n  }\n  static skipped(recordId, reason) {\n    return `SKIPPED — record ${recordId}: ${reason}`;\n  }\n}\n\n// ---------------------------------------------------------------------------\n// 6. PickupTimestampService — orchestrator\n// ---------------------------------------------------------------------------\nclass PickupTimestampService {\n  constructor(repository, logger) {\n    this.repository = repository;\n    this.logger = logger;\n  }\n\n  _validate(recordId) {\n    if (!recordId) {\n      throw new Error('Missing recordId from trigger config — cannot proceed.');\n    }\n  }\n\n  _isFull(progress) {\n    return progress >= (CONFIG.FULL_THRESHOLD - CONFIG.EPSILON);\n  }\n\n  async run(recordId) {\n    this._validate(recordId);\n\n    const record = await this.repository.getById(recordId);\n    const progress = record.getCellValue(FIELDS.FULFILLMENT_PROGRESS) ?? 0;\n\n    this.logger.step('A', `fulfillment_progress_percentage read as ${progress}`);\n\n    // Full — fixed event, only stamped the first time 100% is reached\n    if (this._isFull(progress)) {\n      const already = record.getCellValue(FIELDS.FULL_RELEASED_AT);\n      if (already) {\n        return MessageBuilder.skipped(recordId, 'full_pickup_released_at already set — not overwriting');\n      }\n      await this.repository.writeTimestamp(recordId, FIELDS.FULL_RELEASED_AT, DateManager.nowISO());\n      return MessageBuilder.success(recordId, 'full_pickup_released_at');\n    }\n\n    // Partial — always reflects the most recent change while below 100%\n    if (progress > 0) {\n      await this.repository.writeTimestamp(recordId, FIELDS.PARTIAL_RELEASED_AT, DateManager.nowISO());\n      return MessageBuilder.success(recordId, 'partial_pickup_released_at (updated)');\n    }\n\n    return MessageBuilder.skipped(recordId, `progress is ${progress} — no threshold crossed`);\n  }\n}\n\n// ---------------------------------------------------------------------------\n// MAIN EXECUTION BLOCK\n// ---------------------------------------------------------------------------\ntry {\n  const logger = new Logger();\n  const table = base.getTable(TABLE_IDS.ORDERS);\n  const repository = new OrderRepository(table, logger);\n  const service = new PickupTimestampService(repository, logger);\n\n  const recordId = triggerConfig.recordId;\n\n  const result = await service.run(recordId);\n  logger.step('C', result);\n\n  output.set('result', result);\n  output.set('log', logger.getSummary());\n} catch (err) {\n  console.error(err);\n  output.set('result', `FAILED: ${err.message}`);\n  throw err;\n}","table":null,"tableLabel":null,"fieldsWritten":[],"fieldsLabels":[],"prompt":null,"model":null,"to":null,"subject":null,"message":null}],"subscribers":[{"name":"Axel Nava","email":"anava@singularagency.co","isServiceAccount":false}],"hasScript":true,"hasAi":false,"hasSlack":false,"inferred":true},{"id":"wflKixEYpTeex2VtP","name":"Compare Order Price4Snapshot & Log Changes — Record Updated","description":"This automation compares the order price snapshot and logs any changes when a record is updated. It helps in tracking price variations and maintaining accurate financial records.","status":"deployed","version":35,"trigger":{"typeId":"wttRECORDUPDATED0","label":"Record updated","tableId":"tblHFGbijtvZcRPkE","tableLabel":"tblHFGbijtvZcRPkE","scheduleDetail":null},"steps":[{"type":"watCUSTOMSCRIPT00","label":"Run script","script":"/*\n================================================================================\nAUTOMATION : Compare Order Price4Snapshot & Log Changes — Record Updated\nBASE       : app6Q4xMZ1ngJxiV8 (sandbox)\nTABLE SRC  : Orders - Shopify (tblHFGbijtvZcRPkE)\nTABLE DST  : order_sync_changelog (tblOCgG5WDP51FB2n)\nTRIGGER    : Record updated on Orders - Shopify, watching: Total, Subtotal,\n             Shipping, Taxes, Discount Amount\nVERSION    : 1.0.0 — all field IDs verified against live base\n\nOBJECTIVE\n  Detects price changes synced into Orders - Shopify from Shopify/AM (via Cobalt),\n  for orders already in Fulfillment stage. For each of the 5 tracked fields whose\n  current value differs from its stored snapshot, creates a changelog entry\n  (previous_value, new_value) and advances the snapshot to the new value. Never\n  writes a \"reason\" — Shopify sync does not currently provide one (per Cobalt).\n\nGUARD CLAUSE\n  1. sourceRecordId must be provided by the trigger.\n  2. client_stage must equal \"Fulfillment\" — orders outside Fulfillment are\n     out of scope for this story and are skipped without creating log entries.\n\nERROR HANDLING\n  Errors thrown with descriptive messages. Airtable native failure notification\n  fires on the automation run.\n\nOUTPUTS (output.set)\n  status          : \"SUCCESS\" | \"ERROR\"\n  order_id        : record ID processed\n  fields_changed  : comma-separated list of fields logged this run\n  changes_logged  : count of changelog records created\n  result_message  : human-readable summary\n  error_message   : null on success\n  log_summary     : full Logger output\n================================================================================\n*/\n\n// ─── CONFIGURATION LAYER ───────────────────────────────────────────────────────\n\nconst TABLE_IDS = {\n  ORDERS:    'tblHFGbijtvZcRPkE',\n  CHANGELOG: 'tblOCgG5WDP51FB2n',\n};\n\nconst FIELDS_ORDERS = {\n  client_stage:             'fldxhlu6v6EnpzZk1',\n  total:                    'fldkIMTeKdneKABS4',\n  subtotal:                 'fld9CtuMBLprH0SA1',\n  shipping:                 'fldkorfpXkwh0TWfs',\n  taxes:                    'fld2chJ0ME8MA3OWq',\n  discount_amount:          'fld1ax2cDXZcy2nVg',\n  total_snapshot:           'fldPdbQJQg9VnVIgx',\n  subtotal_snapshot:        'fld4sDAy4UcNOon6U',\n  shipping_snapshot:        'fldrnmgtKUVuNkMYy',\n  taxes_snapshot:           'fldSCiGElabR4JF5K',\n  discount_amount_snapshot: 'fldkFwyKtRCUq7GOD',\n};\n\nconst FIELDS_CHANGELOG = {\n  order:          'fldpDncgR9ImfR7Ax',\n  field_changed:  'fldhvCRFHDiWrtR53',\n  previous_value: 'fldCk1aXfztfWsnLs',\n  new_value:      'fldeKvrtoczn1b3a2',\n  changed_at:     'fldI2iA0qIJLsvmoY',\n};\n\n// Maps each tracked price field to its snapshot counterpart + changelog label\nconst TRACKED_FIELDS = [\n  { current: FIELDS_ORDERS.total,           snapshot: FIELDS_ORDERS.total_snapshot,           label: 'Total' },\n  { current: FIELDS_ORDERS.subtotal,        snapshot: FIELDS_ORDERS.subtotal_snapshot,        label: 'Subtotal' },\n  { current: FIELDS_ORDERS.shipping,        snapshot: FIELDS_ORDERS.shipping_snapshot,        label: 'Shipping' },\n  { current: FIELDS_ORDERS.taxes,           snapshot: FIELDS_ORDERS.taxes_snapshot,           label: 'Taxes' },\n  { current: FIELDS_ORDERS.discount_amount, snapshot: FIELDS_ORDERS.discount_amount_snapshot, label: 'Discount Amount' },\n];\n\nconst CONFIG = { LOG_LEVEL: 'B', REQUIRED_STAGE: 'In Fulfillment' };\n\n// ─── LOGGER CLASS ───────────────────────────────────────────────────────────────\n\nclass Logger {\n  constructor(level = 'B') { this.level = level; this.entries = []; this._levels = { A: 1, B: 2, C: 3 }; }\n  _log(lvl, msg) { if (this._levels[this.level] >= this._levels[lvl]) { const e = `[${lvl}][${new Date().toISOString()}] ${msg}`; this.entries.push(e); console.log(e); } }\n  minimal(msg) { this._log('A', msg); }\n  audit(msg)   { this._log('B', msg); }\n  debug(msg)   { this._log('C', msg); }\n  error(msg)   { const e = `[ERR][${new Date().toISOString()}] ${msg}`; this.entries.push(e); console.error(e); }\n  step(n, msg) { this._log('B', `── STEP ${n}: ${msg}`); }\n  getSummary() { return this.entries.join('\\n'); }\n}\n\n// ─── ORDER REPOSITORY CLASS ────────────────────────────────────────────────────\n\nclass OrderRepository {\n  constructor(logger) { this.table = base.getTable(TABLE_IDS.ORDERS); this.logger = logger; }\n\n  async getById(recordId) {\n    this.logger.step(1, `Loading order → ${recordId}`);\n    const fields = [FIELDS_ORDERS.client_stage, ...TRACKED_FIELDS.map(f => f.current), ...TRACKED_FIELDS.map(f => f.snapshot)];\n    const result = await this.table.selectRecordsAsync({ fields });\n    const record = result.records.find(r => r.id === recordId);\n    if (!record) throw new Error(`Order not found → recordId: ${recordId}`);\n    this.logger.audit(`Order loaded → ${recordId}`);\n    return record;\n  }\n\n  async updateSnapshots(recordId, payload) {\n    if (Object.keys(payload).length === 0) return;\n    this.logger.step(4, `Updating snapshot fields → ${recordId}`);\n    await this.table.updateRecordAsync(recordId, payload);\n    this.logger.audit('Snapshot fields advanced to new values');\n  }\n}\n\n// ─── CHANGELOG REPOSITORY CLASS ─────────────────────────────────────────────────\n\nclass ChangelogRepository {\n  constructor(logger) { this.table = base.getTable(TABLE_IDS.CHANGELOG); this.logger = logger; }\n\n  async createEntry(orderId, fieldLabel, previousValue, newValue) {\n    this.logger.step(3, `Creating changelog entry → ${fieldLabel}: ${previousValue} -> ${newValue}`);\n    const newId = await this.table.createRecordAsync({\n      [FIELDS_CHANGELOG.order]:          [{ id: orderId }],\n      [FIELDS_CHANGELOG.field_changed]:  { name: fieldLabel },\n      [FIELDS_CHANGELOG.previous_value]: previousValue,\n      [FIELDS_CHANGELOG.new_value]:      newValue,\n      [FIELDS_CHANGELOG.changed_at]:     new Date().toISOString(),\n    });\n    this.logger.audit(`Changelog entry created → ${newId}`);\n    return newId;\n  }\n}\n\n// ─── DIFF DETECTOR CLASS ────────────────────────────────────────────────────────\n// Pure comparison logic. No Airtable API calls. No side effects.\n\nclass DiffDetector {\n  constructor(logger) { this.logger = logger; }\n\n  detect(record) {\n    this.logger.step(2, 'Comparing current values vs stored snapshots');\n    const diffs = [];\n    for (const f of TRACKED_FIELDS) {\n      const currentVal  = record.getCellValue(f.current);\n      const snapshotVal = record.getCellValue(f.snapshot);\n      if (currentVal !== snapshotVal) {\n        diffs.push({ label: f.label, snapshotField: f.snapshot, previousValue: snapshotVal, newValue: currentVal });\n      }\n    }\n    this.logger.debug(`${diffs.length} field(s) changed`);\n    return diffs;\n  }\n}\n\n// ─── MESSAGE BUILDER CLASS ──────────────────────────────────────────────────────\n\nclass MessageBuilder {\n  static success(orderId, diffs) {\n    if (diffs.length === 0) return `ℹ️ NO CHANGE\\nOrder: ${orderId}\\nStatus: No tracked price field differed from its snapshot.`;\n    const lines = diffs.map(d => `  - ${d.label}: ${d.previousValue} → ${d.newValue}`).join('\\n');\n    return `✅ CHANGES LOGGED\\nOrder: ${orderId}\\nFields:\\n${lines}`;\n  }\n  static skippedStage(orderId, stage) {\n    return `⏭️ SKIPPED\\nOrder: ${orderId}\\nReason: client_stage is \"${stage}\", not \"Fulfillment\" — out of scope for this story.`;\n  }\n  static error(orderId, errMsg) { return `❌ COMPARE/LOG FAILED\\nOrder: ${orderId || 'unknown'}\\nError: ${errMsg}`; }\n}\n\n// ─── SERVICE CLASS ───────────────────────────────────────────────────────────────\n\nclass ChangelogService {\n  constructor(orderRepo, changelogRepo, diffDetector, logger) {\n    this.orderRepo     = orderRepo;\n    this.changelogRepo = changelogRepo;\n    this.diffDetector  = diffDetector;\n    this.logger        = logger;\n  }\n\n  _validateStage(record) {\n    const stage = record.getCellValueAsString(FIELDS_ORDERS.client_stage);\n    if (stage !== CONFIG.REQUIRED_STAGE) return { passed: false, stage };\n    return { passed: true, stage };\n  }\n\n  async run(recordId) {\n    this.logger.audit(`Service started → order: ${recordId}`);\n    const record = await this.orderRepo.getById(recordId);\n\n    const stageCheck = this._validateStage(record);\n    if (!stageCheck.passed) {\n      this.logger.minimal(`SKIPPED → ${recordId} not in Fulfillment (stage: ${stageCheck.stage})`);\n      return {\n        status: 'SUCCESS', order_id: recordId, fields_changed: '', changes_logged: 0,\n        result_message: MessageBuilder.skippedStage(recordId, stageCheck.stage), error_message: null,\n      };\n    }\n\n    const diffs = this.diffDetector.detect(record);\n    const snapshotUpdates = {};\n    for (const d of diffs) {\n      await this.changelogRepo.createEntry(recordId, d.label, d.previousValue, d.newValue);\n      snapshotUpdates[d.snapshotField] = d.newValue;\n    }\n    await this.orderRepo.updateSnapshots(recordId, snapshotUpdates);\n\n    const resultMessage = MessageBuilder.success(recordId, diffs);\n    this.logger.minimal(`SUCCESS → ${recordId} | ${diffs.length} change(s) logged`);\n\n    return {\n      status: 'SUCCESS', order_id: recordId,\n      fields_changed: diffs.map(d => d.label).join(', '),\n      changes_logged: diffs.length,\n      result_message: resultMessage, error_message: null,\n    };\n  }\n}\n\n// ─── MAIN EXECUTION BLOCK ────────────────────────────────────────────────────────\n\n// !! input.config() MUST be here — NEVER inside try block !!\nconst cfg            = input.config();\nconst sourceRecordId = cfg.recordId;\n\nconst logger = new Logger(CONFIG.LOG_LEVEL);\n\nlet result = { status: 'ERROR', order_id: null, fields_changed: '', changes_logged: 0, result_message: null, error_message: null };\n\ntry {\n  if (!sourceRecordId) throw new Error('Missing required input: recordId. Check the input variable mapping on this script step.');\n\n  logger.audit(`Automation started → record_id: ${sourceRecordId}`);\n\n  const service = new ChangelogService(\n    new OrderRepository(logger),\n    new ChangelogRepository(logger),\n    new DiffDetector(logger),\n    logger\n  );\n  result = await service.run(sourceRecordId);\n\n} catch (err) {\n  logger.error(`Automation failed → ${err.message}`);\n  result.order_id       = sourceRecordId ?? null;\n  result.error_message  = err.message;\n  result.result_message = MessageBuilder.error(sourceRecordId, err.message);\n\n  // !! CRITICAL — re-throw so Airtable marks the automation run as FAILED !!\n  throw err;\n}\n\noutput.set('status',         result.status);\noutput.set('order_id',       result.order_id);\noutput.set('fields_changed', result.fields_changed);\noutput.set('changes_logged', result.changes_logged);\noutput.set('result_message', result.result_message);\noutput.set('error_message',  result.error_message);\noutput.set('log_summary',    logger.getSummary());","table":null,"tableLabel":null,"fieldsWritten":[],"fieldsLabels":[],"prompt":null,"model":null,"to":null,"subject":null,"message":null}],"subscribers":[{"name":"Axel Nava","email":"anava@singularagency.co","isServiceAccount":false}],"hasScript":true,"hasAi":false,"hasSlack":false,"inferred":true},{"id":"wflvIIopF2gYW9e62","name":"Init Order Snapshot — Record Created","description":"This automation initializes price snapshot fields on a new order when it is created. It ensures that all relevant pricing information is captured from the outset.","status":"deployed","version":21,"trigger":{"typeId":"wttRECORDCREATED0","label":"Record created","tableId":"tblHFGbijtvZcRPkE","tableLabel":"tblHFGbijtvZcRPkE","scheduleDetail":null},"steps":[{"type":"watCUSTOMSCRIPT00","label":"Run script","script":"/*\n================================================================================\nAUTOMATION : Init Order Snapshot — Record Created\nBASE       : app6Q4xMZ1ngJxiV8 (sandbox)\nTABLE SRC  : Orders - Shopify (tblHFGbijtvZcRPkE)\nTRIGGER    : Record created on Orders - Shopify\nVERSION    : 1.0.0 — all field IDs verified against live base\n\nOBJECTIVE\n  Initializes the 5 price snapshot fields on a new order to match its current\n  price fields, so automation #2 (compare & log) has a valid baseline to diff\n  against on the next sync update. Never modifies the price fields themselves.\n\nGUARD CLAUSE\n  1. sourceRecordId must be provided by the trigger — cannot snapshot without it.\n\nERROR HANDLING\n  Errors thrown with descriptive messages. Airtable native failure notification\n  fires on the automation run. No Send Email node needed.\n\nOUTPUTS (output.set)\n  status         : \"SUCCESS\" | \"ERROR\"\n  order_id       : record ID snapshotted\n  result_message : human-readable summary\n  error_message  : null on success\n  log_summary    : full Logger output\n================================================================================\n
