*/\n\n// ─── CONFIGURATION LAYER ───────────────────────────────────────────────────────\n\nconst TABLE_IDS = {\n  ORDERS: 'tblHFGbijtvZcRPkE',\n};\n\nconst FIELDS_ORDERS = {\n  total:                    'fldkIMTeKdneKABS4',\n  subtotal:                 'fld9CtuMBLprH0SA1',\n  shipping:                 'fldkorfpXkwh0TWfs',\n  taxes:                    'fld2chJ0ME8MA3OWq',\n  discount_amount:          'fld1ax2cDXZcy2nVg',\n  total_snapshot:           'fldPdbQJQg9VnVIgx',\n  subtotal_snapshot:        'fld4sDAy4UcNOon6U',\n  shipping_snapshot:        'fldrnmgtKUVuNkMYy',\n  taxes_snapshot:           'fldSCiGElabR4JF5K',\n  discount_amount_snapshot: 'fldkFwyKtRCUq7GOD',\n};\n\nconst CONFIG = { LOG_LEVEL: 'B' };\n\n// ─── LOGGER CLASS ───────────────────────────────────────────────────────────────\n\nclass Logger {\n  constructor(level = 'B') { this.level = level; this.entries = []; this._levels = { A: 1, B: 2, C: 3 }; }\n  _log(lvl, msg) { if (this._levels[this.level] >= this._levels[lvl]) { const e = `[${lvl}][${new Date().toISOString()}] ${msg}`; this.entries.push(e); console.log(e); } }\n  minimal(msg) { this._log('A', msg); }\n  audit(msg)   { this._log('B', msg); }\n  debug(msg)   { this._log('C', msg); }\n  error(msg)   { const e = `[ERR][${new Date().toISOString()}] ${msg}`; this.entries.push(e); console.error(e); }\n  step(n, msg) { this._log('B', `── STEP ${n}: ${msg}`); }\n  getSummary() { return this.entries.join('\\n'); }\n}\n\n// ─── ORDER REPOSITORY CLASS ────────────────────────────────────────────────────\n\nclass OrderRepository {\n  constructor(logger) { this.table = base.getTable(TABLE_IDS.ORDERS); this.logger = logger; }\n\n  async getById(recordId) {\n    this.logger.step(1, `Loading order → ${recordId}`);\n    const result = await this.table.selectRecordsAsync({\n      fields: [FIELDS_ORDERS.total, FIELDS_ORDERS.subtotal, FIELDS_ORDERS.shipping, FIELDS_ORDERS.taxes, FIELDS_ORDERS.discount_amount],\n    });\n    const record = result.records.find(r => r.id === recordId);\n    if (!record) throw new Error(`Order not found → recordId: ${recordId}`);\n    this.logger.audit(`Order loaded → ${recordId}`);\n    return record;\n  }\n\n  async writeSnapshot(recordId, payload) {\n    this.logger.step(2, `Writing initial snapshot → ${recordId}`);\n    await this.table.updateRecordAsync(recordId, payload);\n    this.logger.audit('Snapshot fields written');\n  }\n}\n\n// ─── SNAPSHOT MAPPER CLASS ──────────────────────────────────────────────────────\n\nclass SnapshotMapper {\n  constructor(logger) { this.logger = logger; }\n  _num(r, f) { const v = r?.getCellValue(f); return (v !== null && v !== undefined) ? Number(v) : null; }\n\n  buildPayload(record) {\n    this.logger.step(1.5, 'Building snapshot payload from current price fields');\n    const p = {\n      [FIELDS_ORDERS.total_snapshot]:           this._num(record, FIELDS_ORDERS.total),\n      [FIELDS_ORDERS.subtotal_snapshot]:        this._num(record, FIELDS_ORDERS.subtotal),\n      [FIELDS_ORDERS.shipping_snapshot]:        this._num(record, FIELDS_ORDERS.shipping),\n      [FIELDS_ORDERS.taxes_snapshot]:           this._num(record, FIELDS_ORDERS.taxes),\n      [FIELDS_ORDERS.discount_amount_snapshot]: this._num(record, FIELDS_ORDERS.discount_amount),\n    };\n    Object.keys(p).forEach(k => { if (p[k] === null || p[k] === undefined) delete p[k]; });\n    return p;\n  }\n}\n\n// ─── MESSAGE BUILDER CLASS ──────────────────────────────────────────────────────\n\nclass MessageBuilder {\n  static success(orderId) { return `✅ SNAPSHOT INITIALIZED\\nOrder: ${orderId}\\nStatus: All 5 price snapshot fields set to current values.`; }\n  static error(orderId, errMsg) { return `❌ SNAPSHOT INIT FAILED\\nOrder: ${orderId || 'unknown'}\\nError: ${errMsg}`; }\n}\n\n// ─── SERVICE CLASS ───────────────────────────────────────────────────────────────\n\nclass InitSnapshotService {\n  constructor(orderRepo, mapper, logger) { this.orderRepo = orderRepo; this.mapper = mapper; this.logger = logger; }\n\n  async run(recordId) {\n    this.logger.audit(`Service started → order: ${recordId}`);\n    const record = await this.orderRepo.getById(recordId);\n    const payload = this.mapper.buildPayload(record);\n    await this.orderRepo.writeSnapshot(recordId, payload);\n    const resultMessage = MessageBuilder.success(recordId);\n    this.logger.minimal(`SUCCESS → snapshot initialized for ${recordId}`);\n    return { status: 'SUCCESS', order_id: recordId, result_message: resultMessage, error_message: null };\n  }\n}\n\n// ─── MAIN EXECUTION BLOCK ────────────────────────────────────────────────────────\n\n// !! input.config() MUST be here — NEVER inside try block !!\nconst cfg           = input.config();\nconst sourceRecordId = cfg.recordId;\n\nconst logger = new Logger(CONFIG.LOG_LEVEL);\n\nlet result = { status: 'ERROR', order_id: null, result_message: null, error_message: null };\n\ntry {\n  if (!sourceRecordId) throw new Error('Missing required input: recordId. Check the input variable mapping on this script step.');\n\n  logger.audit(`Automation started → record_id: ${sourceRecordId}`);\n\n  const service = new InitSnapshotService(new OrderRepository(logger), new SnapshotMapper(logger), logger);\n  result = await service.run(sourceRecordId);\n\n} catch (err) {\n  logger.error(`Automation failed → ${err.message}`);\n  result.order_id      = sourceRecordId ?? null;\n  result.error_message = err.message;\n  result.result_message = MessageBuilder.error(sourceRecordId, err.message);\n\n  // !! CRITICAL — re-throw so Airtable marks the automation run as FAILED !!\n  throw err;\n}\n\noutput.set('status',         result.status);\noutput.set('order_id',       result.order_id);\noutput.set('result_message', result.result_message);\noutput.set('error_message',  result.error_message);\noutput.set('log_summary',    logger.getSummary());","table":null,"tableLabel":null,"fieldsWritten":[],"fieldsLabels":[],"prompt":null,"model":null,"to":null,"subject":null,"message":null}],"subscribers":[{"name":"Axel Nava","email":"anava@singularagency.co","isServiceAccount":false}],"hasScript":true,"hasAi":false,"hasSlack":false,"inferred":true},{"id":"wflKbpqPFxXvYaDpp","name":"Order Ready Evaluation — Record Updated (Orders - Shopify)","description":"This automation evaluates whether an order is ready based on updates to the order's status. It facilitates timely processing and communication with clients regarding their orders.","status":"deployed","version":30,"trigger":{"typeId":"wttRECORDUPDATED0","label":"Record updated","tableId":"tblHFGbijtvZcRPkE","tableLabel":"tblHFGbijtvZcRPkE","scheduleDetail":null},"steps":[{"type":"watCUSTOMSCRIPT00","label":"Run script","script":"/*\n================================================================================\nAUTOMATION   : Order Ready Evaluation — Record Updated (Orders - Shopify)\nBASE         : app6Q4xMZ1ngJxiV8 (sandbox) — publicar a appUC2NFAlURayLx9 luego\nTABLE SRC    : Orders - Shopify (tblHFGbijtvZcRPkE)\nTABLE DEST   : DF Clients (tblLLUlDgJ4ktzF7c)\nTRIGGER      : Record updated — Orders - Shopify, watching: picked_status_percentage,\n               Category Lookup\nVERSION      : 1.0.0 — todos los field IDs verificados contra\n               customer_journey_2026_07_14_15_00.dbml\n\nOBJECTIVE\n  Evalúa la regla de Julia para \"Order Ready\" (fase interna: \"In Production\"):\n    (a) el order tiene al menos un item categoría GOWN (Category Lookup incluye\n        \"GOWN\") Y ese order está al menos parcialmente picked, O\n    (b) picked_status_percentage del order es > 75%\n  Si cualquiera se cumple Y el cliente NO está ya en o después de \"In Production\"\n  en STAGE_ORDER, actualiza DF Clients.stage a \"In Production\". Nunca retrocede\n  a un cliente que ya avanzó más allá.\n\n  NOTA DE DISEÑO: la evaluación es POR ORDER (no agregada entre múltiples orders\n  del cliente), ya que picked_status_percentage es un formula field a nivel de\n  order, no un rollup a nivel de cliente. Si un cliente tiene varios orders,\n  basta con que UNO califique para marcar Order Ready. Si Julia/Axel confirman\n  que se requiere agregación real entre orders, avisar antes de publicar a prod.\n\nGUARD CLAUSE\n  1. sourceRecordId (order) debe venir del trigger.\n  2. El order debe tener un client vinculado. Si no, SKIP sin error.\n  3. Si el cliente ya está en una fase igual o posterior a \"In Production\" en\n     STAGE_ORDER, SKIP — esta automation solo AVANZA, nunca retrocede.\n  4. Edge case: si Category Lookup viene vacío (sin items resueltos) Y\n     picked_status_percentage es null, SKIP — no hay datos suficientes para\n     evaluar (evita false positive por datos faltantes/atrasados de Cobalt).\n\nOUTPUTS (output.set)\n  status            : \"SUCCESS\" | \"ERROR\"\n  client_id         : record ID del cliente evaluado, o null\n  gown_ready        : boolean — si califica por gown + picked\n  percent_picked    : número 0–1 — picked_status_percentage del order\n  qualifies         : boolean — resultado final de la regla Order Ready\n  stage_written     : \"In Production\" | null (null si no se escribió)\n  result_message    : resumen legible\n  error_message     : null en éxito\n  log_summary       : trace completo\n================================================================================\n*/\n\n// ─────────────────────────────────────────────────────────────────────────────\n// CONFIGURATION LAYER\n// ─────────────────────────────────────────────────────────────────────────────\n\nconst TABLE_IDS = {\n  ORDERS:  'tblHFGbijtvZcRPkE', // Orders - Shopify\n  CLIENTS: 'tblLLUlDgJ4ktzF7c', // DF Clients\n};\n\n// Orders - Shopify fields — verificados contra customer_journey DBML\nconst FIELDS_ORDERS = {\n  client:                  'fldeVnAInz9d1jpY5', // multipleRecordLinks -> DF Clients\n  category_lookup:         'fldSF1GXY5MgiAXdl', // multipleLookupValues (via Items -> DF Styles.Category)\n  picked_status_percentage:'fldjC8M11Pis7eMxF', // formula, 0-1 fraction\n};\n\n// DF Clients fields\nconst FIELDS_CLIENTS = {\n  stage: 'fldLcxVZvI1rigBlh', // confirmado en pipeline.tsx\n};\n\n// Mantenido en paralelo al STAGE_ORDER de las interfaces (pipeline.tsx /\n// alterations.tsx) SOLO para no avanzar/retroceder incorrectamente. Ver\n// hallazgo de duplicación en la auditoría de phase logic — idealmente esto\n// debería resolverse contra una fuente compartida una vez esté en GitHub.\nconst STAGE_ORDER = [\n  'Pre-Appointment',\n  'Deliberating',\n  'Sold',\n  'In Production',   // \"Order Ready\" en UI\n  'In Alterations',\n  'In Fulfillment',\n];\n\nconst CONFIG = {\n  LOG_LEVEL: 'B',                // A=minimal | B=audit (default) | C=debug\n  PICK_PERCENT_THRESHOLD: 0.75,  // > 75% (estrictamente mayor, por Julia)\n  TARGET_STAGE: 'In Production',\n  GOWN_CATEGORY_VALUE: 'GOWN',   // confirmado en DF Styles.Category (singleSelect)\n};\n\n// ─────────────────────────────────────────────────────────────────────────────\n// LOGGER CLASS\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass Logger {\n  constructor(level = 'B') { this.level = level; this.entries = []; this._levels = { A: 1, B: 2, C: 3 }; }\n  _log(lvl, msg) { if (this._levels[this.level] >= this._levels[lvl]) { const e = `[${lvl}][${new Date().toISOString()}] ${msg}`; this.entries.push(e); console.log(e); } }\n  minimal(msg) { this._log('A', msg); }\n  audit(msg)   { this._log('B', msg); }\n  debug(msg)   { this._log('C', msg); }\n  error(msg)   { const e = `[ERR][${new Date().toISOString()}] ${msg}`; this.entries.push(e); console.error(e); }\n  step(n, msg) { this._log('B', `── STEP ${n}: ${msg}`); }\n  getSummary() { return this.entries.join('\\n'); }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// ORDER REPOSITORY\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass OrderRepository {\n  constructor(logger) { this.table = base.getTable(TABLE_IDS.ORDERS); this.logger = logger; }\n\n  async getById(recordId) {\n    this.logger.step(1, `Loading order → ${recordId}`);\n    const result = await this.table.selectRecordsAsync({ fields: Object.values(FIELDS_ORDERS) });\n    const record = result.records.find(r => r.id === recordId);\n    if (!record) throw new Error(`Order not found → recordId: ${recordId}`);\n    this.logger.audit(`Order loaded → ${recordId}`);\n    return record;\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// CLIENTS REPOSITORY\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass ClientsRepository {\n  constructor(logger) { this.table = base.getTable(TABLE_IDS.CLIENTS); this.logger = logger; }\n\n  async getById(clientId) {\n    this.logger.step(3, `Loading client → ${clientId}`);\n    const result = await this.table.selectRecordsAsync({ fields: [FIELDS_CLIENTS.stage] });\n    const record = result.records.find(r => r.id === clientId);\n    if (!record) throw new Error(`Client not found → clientId: ${clientId}`);\n    this.logger.audit(`Client loaded → ${clientId}`);\n    return record;\n  }\n\n  async writeStage(clientId, stageName) {\n    this.logger.step(5, `Writing stage=\"${stageName}\" → client: ${clientId}`);\n    await this.table.updateRecordAsync(clientId, { [FIELDS_CLIENTS.stage]: { name: stageName } });\n    this.logger.audit(`Stage written → ${stageName}`);\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// ORDER READY EVALUATOR — lógica pura, sin llamadas a Airtable\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass OrderReadyEvaluator {\n  constructor(logger) { this.logger = logger; }\n\n  evaluate(order) {\n    this.logger.step(4, 'Evaluando gown-ready y % picked del order');\n\n    const categoryLookup = order.getCellValue(FIELDS_ORDERS.category_lookup); // array of strings, or null\n    const percentPicked  = order.getCellValue(FIELDS_ORDERS.picked_status_percentage);\n\n    const hasData = (categoryLookup && categoryLookup.length > 0) || (percentPicked !== null && percentPicked !== undefined);\n    if (!hasData) {\n      this.logger.audit('Category Lookup vacío y picked_status_percentage null — datos insuficientes. SKIP.');\n      return { qualifies: false, gownReady: false, percentPicked: 0, evaluable: false };\n    }\n\n    const hasGownItem = Array.isArray(categoryLookup) && categoryLookup.includes(CONFIG.GOWN_CATEGORY_VALUE);\n    const pct = percentPicked ?? 0;\n    const gownReady = hasGownItem && pct > 0;\n    const qualifies = gownReady || pct > CONFIG.PICK_PERCENT_THRESHOLD;\n\n    this.logger.audit(`categoryLookup=[${(categoryLookup || []).join(', ')}] | percentPicked=${(pct * 100).toFixed(1)}% | gownReady=${gownReady} | qualifies=${qualifies}`);\n    return { qualifies, gownReady, percentPicked: pct, evaluable: true };\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// MESSAGE BUILDER\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass MessageBuilder {\n  static success(clientId, qualifies, stageWritten) {\n    return qualifies\n      ? `✅ ORDER READY → client ${clientId} califica. Stage escrito: ${stageWritten ?? '(sin cambio — ya estaba más adelante)'}`\n      : `ℹ️ NO CALIFICA aún → client ${clientId} no cumple gown-ready ni >75%.`;\n  }\n  static skipped(reason) { return `⏭️ SKIPPED — ${reason}`; }\n  static error(err) { return `❌ ORDER READY EVAL FAILED: ${err.message}`; }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// SERVICE — orquestador\n// ─────────────────────────────────────────────────────────────────────────────\n\nclass OrderReadyService {\n  constructor(orderRepo, clientsRepo, evaluator, logger) {\n    this.orderRepo = orderRepo;\n    this.clientsRepo = clientsRepo;\n    this.evaluator = evaluator;\n    this.logger = logger;\n  }\n\n  async run(triggerRecordId) {\n    this.logger.audit(`Service started → order: ${triggerRecordId}`);\n\n    const order = await this.orderRepo.getById(triggerRecordId);\n\n    const linkedClients = order.getCellValue(FIELDS_ORDERS.client) || [];\n    if (!linkedClients.length) {\n      return {\n        status: 'SUCCESS', client_id: null, gown_ready: false, percent_picked: 0,\n        qualifies: false, stage_written: null,\n        result_message: MessageBuilder.skipped('Order sin client vinculado.'),\n      };\n    }\n    const clientId = linkedClients[0].id;\n    this.logger.step(2, `Client resuelto → ${clientId}`);\n\n    // GUARD 3 — nunca retroceder\n    const clientRecord = await this.clientsRepo.getById(clientId);\n    const currentStage = clientRecord.getCellValueAsString(FIELDS_CLIENTS.stage);\n    const currentIdx = STAGE_ORDER.indexOf(currentStage);\n    const targetIdx = STAGE_ORDER.indexOf(CONFIG.TARGET_STAGE);\n    if (currentIdx !== -1 && currentIdx >= targetIdx) {\n      return {\n        status: 'SUCCESS', client_id: clientId, gown_ready: false, percent_picked: 0,\n        qualifies: false, stage_written: null,\n        result_message: MessageBuilder.skipped(`client ya está en/después de \"${CONFIG.TARGET_STAGE}\" (stage actual: \"${currentStage}\"). No se retrocede.`),\n      };\n    }\n\n    const { qualifies, gownReady, percentPicked, evaluable } = this.evaluator.evaluate(order);\n\n    if (!evaluable) {\n      return {\n        status: 'SUCCESS', client_id: clientId, gown_ready: false, percent_picked: 0,\n        qualifies: false, stage_written: null,\n        result_message: MessageBuilder.skipped('Datos insuficientes (Category Lookup vacío y picked_status_percentage null).'),\n      };\n    }\n\n    let stageWritten = null;\n    if (qualifies) {\n      await this.clientsRepo.writeStage(clientId, CONFIG.TARGET_STAGE);\n      stageWritten = CONFIG.TARGET_STAGE;\n    }\n\n    return {\n      status: 'SUCCESS', client_id: clientId, gown_ready: gownReady, percent_picked: percentPicked,\n      qualifies, stage_written: stageWritten,\n      result_message: MessageBuilder.success(clientId, qualifies, stageWritten),\n    };\n  }\n}\n\n// ─────────────────────────────────────────────────────────────────────────────\n// MAIN EXECUTION BLOCK\n// input.config() llamado UNA vez, scope global, antes del try.\n// ─────────────────────────────────────────────────────────────────────────────\n\nconst cfg = input.config();\nconst triggerRecordId = cfg.recordId;\n\nconst logger = new Logger(CONFIG.LOG_LEVEL);\n\nlet result = {\n  status: 'ERROR', client_id: null, gown_ready: false, percent_picked: 0,\n  qualifies: false, stage_written: null, result_message: null, error_message: null,\n};\n\ntry {\n  if (!triggerRecordId) throw new Error(\n    'Missing required input: recordId. Ensure the trigger passes the order Record ID via input variable \"recordId\".'\n  );\n\n  logger.audit(`Automation started → recordId: ${triggerRecordId}`);\n\n  const service = new OrderReadyService(\n    new OrderRepository(logger),\n    new ClientsRepository(logger),\n    new OrderReadyEvaluator(logger),\n    logger\n  );\n\n  result = await service.run(triggerRecordId);\n  result.error_message = null;\n\n} catch (err) {\n  logger.error(`Automation failed → ${err.message}`);\n  result.error_message = err.message;\n  result.result_message = MessageBuilder.error(err);\n  // Re-throw → Airtable marks run as FAILED, native notification fires\n  throw err;\n\n} finally {\n  result.log_summary = logger.getSummary();\n}\n\noutput.set('status',         result.status);\noutput.set('client_id',      result.client_id);\noutput.set('gown_ready',     result.gown_ready);\noutput.set('percent_picked', result.percent_picked);\noutput.set('qualifies',      result.qualifies);\noutput.set('stage_written',  result.stage_written);\noutput.set('result_message', result.result_message);\noutput.set('error_message',  result.error_message);\noutput.set('log_summary',    result.log_summary);\n\nlogger.audit(`Script complete → status: ${result.status} | qualifies: ${result.qualifies}`);","table":null,"tableLabel":null,"fieldsWritten":[],"fieldsLabels":[],"prompt":null,"model":null,"to":null,"subject":null,"message":null}],"subscribers":[{"name":"Axel Nava","email":"anava@singularagency.co","isServiceAccount":false}],"hasScript":true,"hasAi":false,"hasSlack":false,"inferred":true}];
